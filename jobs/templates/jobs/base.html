<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}JobBoard{% endblock %}</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f8fafc; color: #1e293b; }
    a { color: inherit; text-decoration: none; }
    nav { background: #1e293b; padding: 0 2rem; display: flex; align-items: center; justify-content: space-between; height: 60px; }
    nav a.brand { font-size: 1.25rem; font-weight: 800; color: #38bdf8; }
    nav .nav-links { display: flex; gap: 1.5rem; }
    nav .nav-links a { color: #94a3b8; font-size: 0.9rem; font-weight: 500; transition: color 0.15s; }
    nav .nav-links a:hover { color: #fff; }
    .container { max-width: 1100px; margin: 0 auto; padding: 2rem 1.5rem; }
    .messages { padding: 0.75rem 1.5rem; }
    .msg { padding: 0.75rem 1rem; border-radius: 8px; margin-bottom: 0.5rem; font-size: 0.9rem; }
    .msg.success { background: #dcfce7; color: #15803d; }
    .msg.error { background: #fee2e2; color: #b91c1c; }
    .form-input, .form-textarea, .form-select, .form-file { width: 100%; padding: 0.6rem 0.875rem; border-radius: 8px; border: 1px solid #e2e8f0; font-size: 0.875rem; background: #fff; }
    .form-textarea { resize: vertical; }
    .btn { display: inline-block; padding: 0.6rem 1.25rem; border-radius: 8px; font-weight: 600; font-size: 0.875rem; cursor: pointer; border: none; transition: opacity 0.15s; }
    .btn-primary { background: #6366f1; color: #fff; }
    .btn-primary:hover { opacity: 0.9; }
    .badge { display: inline-block; padding: 0.25rem 0.6rem; border-radius: 999px; font-size: 0.7rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; }
    .badge-blue { background: #dbeafe; color: #1d4ed8; }
    .badge-green { background: #dcfce7; color: #15803d; }
    .badge-purple { background: #ede9fe; color: #7c3aed; }
    .badge-orange { background: #ffedd5; color: #c2410c; }
    footer { margin-top: 4rem; background: #1e293b; color: #64748b; text-align: center; padding: 1.5rem; font-size: 0.85rem; }
  </style>
  {% block extra_styles %}{% endblock %}
</head>
<body>
<nav>
  <a href="/" class="brand">🏢 JobBoard</a>
  <div class="nav-links">
    <a href="/">Browse Jobs</a>
    <a href="/companies/">Companies</a>
  </div>
</nav>
{% if messages %}
<div class="messages">
  {% for message in messages %}
  <div class="msg {{ message.tags }}">{{ message }}</div>
  {% endfor %}
</div>
{% endif %}
{% block content %}{% endblock %}
<footer>© 2024 JobBoard · Find your next opportunity</footer>
</body>
</html>
